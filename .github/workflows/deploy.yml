name: Deploy SOVEREIGN//77 to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Publishing the built site to the gh-pages branch needs contents: write only —
# no Pages-admin permission required (the App token lacks that).
permissions:
  contents: write

concurrency:
  group: pages-deploy
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: SPA fallback + Jekyll opt-out
        # 404.html serves the app for deep-link reloads; .nojekyll stops Pages
        # from stripping asset folders.
        run: |
          cp dist/index.html dist/404.html
          touch dist/.nojekyll

      - name: Publish to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          force_orphan: true
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
